<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filters</title>
    <style>
        /*  img{
            filter: blur(10px);
        }*/
        .img1 {
            filter: brightness(122%) contrast(200%);
        }

        .img2 {
            filter: sepia(100%);
        }

        .img3 {
            filter: grayscale(100%);
        }
    </style>
</head>

<body>
    <div class="container">
        <img class="img1" src="https://th.bing.com/th/id/OIP.LPfuDF8yjUyV4z3tcGJ8XQHaOU?rs=1&pid=ImgDetMain"
            alt="image">
        <img class="img2" width="1000px" height="1000px"
            src="https://www.theindianwire.com/wp-content/uploads/2017/01/hrithik_Roshan__.jpg" alt="image">
        <img class="img3" width="1000px" height="1000px"
            src="https://th.bing.com/th/id/R.6ef5638b32f85a73a180d45b67ac3c75?rik=LKnTx3pEN40n%2bA&riu=http%3a%2f%2fpic.photo-aks.com%2fphoto%2factor%2findian%2flarge%2fshahrukh-khan-wallpaper.jpg&ehk=4j1LpzKTj4n1MM7r2Ld4UXGIfvPvKSzwhbQTPMYMlPg%3d&risl=&pid=ImgRaw&r=0"
            alt="image">
    </div>
</body>

</html>
