<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar using Flexbox</title>
    <style>
        .brand-logo {
            width: 165px;
            height: 65px;
            cursor: pointer;
        }

        .arrow {
            width: 10px;
            height: 10px;
        }

        .lang {
            height: 40px;
            width: 40px;
        }

        ul {
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
            color: rgba(0, 0, 0, 0.596);
        }
        nav{
            display: flex;
            align-items: center;
            justify-content: space-around;
            gap: 250px;
        }
        li{
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <img class="brand-logo" src="brand-logo.png" alt="brand-logo">
            <ul>
                <li>Products <img class="arrow" src="arrow.png" alt="arrow"></li>
                <li>Pricing <img class="arrow" src="arrow.png" alt="arrow"></li>
                <li>Resources <img class="arrow" src="arrow.png" alt="arrow"></li>
                <li>About us <img class="arrow" src="arrow.png" alt="arrow"></li>
                <li>Security and compliance</li>
                <li><img class="lang" src="language.jpg" alt="language"></li>
            </ul>
        </nav>
    </header>
</body>

</html>
