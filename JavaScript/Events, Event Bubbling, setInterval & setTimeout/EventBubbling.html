<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Bubbling</title>
    <style>
      .child {
        background-color: aliceblue;
        border: 2px solid black;
        padding: 14px;
        margin: 14px;
        cursor: pointer;
      }
      .childContainer {
        background-color: beige;
        padding: 14px;
        margin: 14px;
      }

      .container {
        background-color: yellow;
        padding: 14px;
        margin: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="childContainer">
        <div class="child">I am a child.</div>
      </section>
    </div>
    <button id="btn2">click</button>
    <script>
      document.querySelector(".child").addEventListener("click", (e) => {
        e.stopPropagation(); //stop propogation() is used to stop event bubbling.
        alert("child was clicked");
      });

      document
        .querySelector(".childContainer")
        .addEventListener("click", (e) => {
          e.stopPropagation();
          alert("child container was clicked");
        });
      const myFunc = () => {
        alert("container was clicked");
      };
      document.querySelector(".container").addEventListener("click", myFunc);

      document.getElementById("btn2").addEventListener("click", () => {
        document
          .querySelector(".container")
          .removeEventListener("click", myFunc);
      });

      function getRandomColor() {
        let val1 = Math.ceil(0 + Math.random() * 255); //Math.ceil() is used to round off numbers
        let val2 = Math.ceil(0 + Math.random() * 255); //Math.random() is used to generate random numbers
        let val3 = Math.ceil(0 + Math.random() * 255);
        return `rgb(${val1},${val2},${val3})`;
      }

     let a= setInterval(() => {//setInterval() adds time interval in a function.It runs continuosly at the decided interval
        document.querySelector(".childContainer").style.background = getRandomColor();
      }, 1000); //it takes interval in miliseconds

      clearInterval(a)//clearInterval() is used to stop setInterval().

      let y= setTimeout(() => {//setTimeout() works as same as setInterval() but it runs only one time at the decided interval.
        document.querySelector(".childContainer").style.background = getRandomColor();
      }, 1000); //it takes interval in miliseconds

      clearTimeout(y)//clearTimeout() isused to stop setTimeout().
    </script>
  </body>
</html>
