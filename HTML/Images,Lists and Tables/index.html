<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img width="230" height="230" src="image.png" alt="Train image">
    <br>
    <table>
        <caption>Employees Details</caption>
        <thead>
        <tr>
            <th>Name</th>
            <th>Designation</th>
            <th>Faviorite Language</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>Sandeep</td>
            <td>Programmer</td>
            <td>HTML</td>
        </tr>
        <tr>
            <td colspan="2">Hriday</td>
            <td rowspan="2">HTML</td>
        </tr>
        <tr>
            <td colspan="2">Monu</td>
        </tr>
        </tbody>
        <tfoot>
            <tr>
            <td colspan="2">Hriday</td>
            <td rowspan="2">Foot</td>
            </tr>
        </tfoot>
    </table>
    <ul type="square">
        <li>Hriday</li>
        <li>Sandeep</li>
        <li>Monu</li>
    </ul>
    <ol type="I">
        <li>Hriday</li>
        <li>Sandeep</li>
        <li>Monu</li>
    </ol>
    <dl>
        <dt>HTML</dt>
        <dd>Hyper Text Markup Language</dd>

        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>

        <dt>JS</dt>
        <dd>JavaScript</dd>
    </dl>
</body>
</html>
