<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video,Audio and Media in HTML</title>
</head>
<body>
    <video src="video.mp4" height="255" controls poster="poster.jpg"></video>
    <audio src="audio.m4a" controls></audio>
    <svg height="100" width="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="red"/>
    </svg>
    <img src="img.svg" alt="sample svg">
    <iframe src="https://en.wikipedia.org/wiki/India" width="422" height="444"></iframe>
</body>
</html>
