<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations</title>
    <style>
        .container {
            height: 80vh;
            width: 50vw;
            background-color: rgb(33, 116, 116);
        }

        .box {
            width: 10vw;
            height: 15vh;
            background-color: aqua;
            /*  animation-name: harryKaAnimation;
            animation-duration: 1s;
            animation-iteration-count: 1;
            animation-timing-function: ease-out;
            animation-delay: 1s;
            animation-direction: alternate-reverse;
            animation-play-state: running;
            animation-fill-mode: forwards;*/
            /*  animation: harryKaAnimation 1s 1 ease-out 1s forwards;*/
            animation: harryKaAnimation 2s ease-in-out 3s 1,
                harry2 3s ease-in-out 3s 1;
        }

        @keyframes harryKaAnimation {
            from {
                background-color: red;
            }

            to {
                background-color: yellow;
                transform: translateX(1000px);
            }
        }

        @keyframes harry2 {
            0% {
                transform: rotate(100deg);
            }

            20% {
                transform: rotate(200deg);
            }

            50% {
                transform: rotate(220deg);
            }

            80% {
                transform: rotate(300deg);
            }

            100% {
                transform: rotate(310deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            box
        </div>
    </div>
</body>

</html>
