<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Object-fit and Object-cover</title>
    <style>
        .container {
            height: 488px;
            width: 466px;
            border: 2px solid black;
            /* background-color: azure;*/
            background-image: url(https://i.pinimg.com/originals/be/4a/6c/be4a6c05171b931325f3a24985220b8e.jpg);
            background-position: top right;
            background-repeat: no-repeat;
        }

        img {
            height: 488px;
            width: 466px;
            object-fit: cover;
            /*object-fit: contain;*/
            object-position: top right;
        }
    </style>
</head>

<body>
    <div class="container">
        <!--<img src="https://i.pinimg.com/originals/be/4a/6c/be4a6c05171b931325f3a24985220b8e.jpg" alt="image">-->
    </div>
</body>

</html>
