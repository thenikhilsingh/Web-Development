<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Not Found</title>
    <style>
      body {
        background: #f8f8f8;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .center-container {
        text-align: center;
      }
      .center-container h1 {
        font-size: 6rem;
        color: #e74c3c;
        margin-bottom: 0.5em;
      }
      .center-container h2 {
        font-size: 2rem;
        color: #333;
        margin-bottom: 1em;
      }
      .center-container p {
        font-size: 1.2rem;
        color: #666;
        margin-bottom: 2em;
      }
      .center-container a {
        display: inline-block;
        padding: 0.75em 2em;
        background: #3498db;
        color: #fff;
        border-radius: 4px;
        text-decoration: none;
        font-size: 1rem;
        transition: background 0.2s;
      }
      .center-container a:hover {
        background: #217dbb;
      }
    </style>
  </head>

  <body>
    <div class="center-container">
      <h1>404</h1>
      <h2>Oops! Page Not Found</h2>
      <p>
        The page you are looking for might have been removed, had its name
        changed, or is temporarily unavailable.
      </p>
      <a href="/">Go to Homepage</a>
    </div>
  </body>
</html>
